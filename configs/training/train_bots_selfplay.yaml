# @package _global_
# Self-play stage 1: one role-conditioned PPO for all bot roles.
# Use: python scripts/run_training.py training=train_bots_selfplay
# Multi-bot stage-1 needs policy sync or DummyVecEnv-only; see initial_bots below.
training:
  stage: 1
  total_timesteps: 2000000
  selfplay_iterations: 20
  n_envs: 8
  n_steps: 512
  learning_rate: 3.0e-4
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  pool_max_size: 10
  checkpoint_interval: 50000
  eval_freq: 10000
  n_eval_episodes: 5
  pool_dir: checkpoints/pool
  checkpoint_dir: checkpoints
  log_dir: logs

game:
  initial_bots: 1
