# @package _global_
# MAPPO baseline (stage 4): centralized critic + concat global obs.
# Use: python scripts/run_training.py training=train_mappo_bots
training:
  stage: 4
  algorithm: mappo
  total_timesteps: 3000000
  selfplay_iterations: 30
  n_envs: 8
  n_steps: 512
  learning_rate: 3.0e-4
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  critic_hidden_dim: 256
  pool_max_size: 15
  checkpoint_interval: 100000
  opponent_sampling: uniform
  pool_dir: checkpoints/pool
  checkpoint_dir: checkpoints
  log_dir: logs

game:
  initial_bots: 4

logging:
  use_tensorboard: true
