# @package _global_
# Self-play stage 2: MaskablePPO manager vs pool; bots from stage-1 checkpoint.
# Use: python scripts/run_training.py training=train_village_selfplay training.stage=2
training:
  stage: 2
  total_timesteps: 1000000
  selfplay_iterations: 10
  n_envs: 4
  n_steps: 256
  learning_rate: 1.0e-4
  batch_size: 128
  n_epochs: 10
  gamma: 0.99
  pool_max_size: 10
  checkpoint_interval: 25000
  pool_dir: checkpoints/pool
  checkpoint_dir: checkpoints
  log_dir: logs

game:
  bot_rl_checkpoint: checkpoints/bots/bot_final.zip
