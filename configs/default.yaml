defaults:
  - map
  - economy
  - combat
  - buildings
  - rewards/bot_rewards
  - rewards/village_rewards
  - training: train_mappo_bots
  - _self_

game:
  max_ticks: 3000
  manager_interval: 5
  initial_resources:
    wood: 150
    stone: 80
    food: 400
  initial_bots: 8
  initial_buildings:
    - barracks
    - storage
  blueprint_adjacent_to_townhall: true
  max_bots_for_role_change: 32

logging:
  use_tensorboard: true

rendering:
  cell_size: 24
  fps: 5
  # 3D view (render_mode human_3d / rgb_array_3d)
  window_width_3d: 960
  window_height_3d: 720
  legend_width_3d: 268
  camera_fov_deg: 50
  camera_dist_scale: 1.4
  # zoom: distance *= camera_zoom_mul (wheel over map, +/- / PgUp/PgDn)
  camera_zoom_mul_min: 0.22
  camera_zoom_mul_max: 2.85
  camera_zoom_wheel_step: 0.11
  camera_dist_min: 3.5
  camera_pitch_deg: 32
  camera_yaw_deg: 40
  # 0 = fixed / mouse+keys only; set e.g. 10 for idle spin
  auto_rotate_deg_per_sec: 0
  # Left-drag on the map: degrees per pixel; arrow keys use orbit_key_deg_per_sec
  orbit_mouse_sensitivity: 0.35
  orbit_key_deg_per_sec: 72

hydra:
  run:
    dir: logs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
