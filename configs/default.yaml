defaults:
  - map
  - economy
  - combat
  - buildings
  - rewards/bot_rewards
  - rewards/village_rewards
  - training: train_bots_selfplay
  - _self_

game:
  max_ticks: 2000
  manager_interval: 5
  initial_resources:
    wood: 200
    stone: 100
    food: 500
  initial_bots: 10
  initial_buildings:
    - barracks
    - storage
  blueprint_adjacent_to_townhall: true
  max_bots_for_role_change: 32

logging:
  use_tensorboard: true

rendering:
  cell_size: 24
  fps: 30
  # 3D view (render_mode human_3d / rgb_array_3d)
  window_width_3d: 960
  window_height_3d: 720
  camera_fov_deg: 50
  camera_dist_scale: 1.4
  camera_pitch_deg: 32
  camera_yaw_deg: 40
  auto_rotate_deg_per_sec: 10

hydra:
  run:
    dir: logs/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
